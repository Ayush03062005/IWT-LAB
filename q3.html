<html>
<head>
<title>Ass6-q3</title>
<style>
#colorbox{
width : 300px;
height: 150px;
border: 2px solid black;
margin-bottom: 20px;
background-color: lightgrey;
}



</style>
</head>
<body>
<h1>Background Color Changer</h1>
<div id="colorbox"></div>
<button id="red-btn" onclick="changeColor('red')">RED</div>

<button id="blue-btn" onclick="changeColor('blue')">BLUE</div>

<button id="green-btn" onclick="changeColor('green')">GREEN</div>

<script>
function changeColor(newcolor)
{
var response=confirm("Do you really want to change the color to "+newcolor+"?")

if(response==true)
{
document.getElementById("colorbox").style.backgroundColor = newcolor
}

}

</script>


</body>
</html>
