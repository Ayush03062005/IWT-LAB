<html>
<head>
<title>Ass6-q2</title>
</head>
<body>
<p id="myParagraph">This is the paragraph to be toggled</p>

<button id="toggle-btn" onclick="togglevisibility()">Hide Text</button>

<script>
function togglevisibility()
{
var para=document.getElementById("myParagraph")
var btn=document.getElementById("toggle-btn")

if(para.style.display=="none")
	{
		para.style.display="block"
		btn.innerText="Hide Text"
	}
else
	{
		para.style.display="none"
		btn.innerText="Show text"
	}	

}
</script>
</body>
</html>
