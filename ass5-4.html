<script>
a=new Array(1,2,3,4,5)
sum=0
for(i=0;i<5;i++)
{
sum=sum+a[i]
}
avg=sum/5
console.log(avg)
max=a[0]
min=a[4]
for(i=0;i<5;i++)
{
	if(a[i]>max)
	max=a[i]
	
	if(a[i]<min)
	min=a[i]
}
console.log("Largest: "+max+"\n"+"Smallest: "+min)
</script>
