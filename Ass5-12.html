<script>
function generateFibonacci(n) {
  if (n <= 0) return [];
  if (n === 1) return [0];

  let fib = [0, 1]; 

  for (let i = 2; i < n; i++) {
   
    let nextNumber = fib[i - 1] + fib[i - 2];
    fib.push(nextNumber);
  }

  return fib;
}


const count = 10;
const result = generateFibonacci(count);
console.log(result); 

</script>
